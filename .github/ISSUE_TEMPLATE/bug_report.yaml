name: Bug Report
description: Report a bug in kubeswarm
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill in as much detail as possible.
        **Redact any API keys or secrets before submitting.**

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Apply this YAML: ...
        2. Run: kubectl get ...
        3. See error: ...
    validations:
      required: true

  - type: textarea
    id: yaml
    attributes:
      label: SwarmAgent / SwarmFlow / SwarmService YAML
      description: Paste the CR that triggered the issue. Redact secrets.
      render: yaml

  - type: textarea
    id: logs
    attributes:
      label: Controller logs
      description: "`kubectl logs -n swarm-system -l control-plane=controller-manager`"
      render: shell

  - type: input
    id: operator-version
    attributes:
      label: kubeswarm version
      description: "`kubectl get deployment kubeswarm -n swarm-system -o jsonpath='{.spec.template.spec.containers[0].image}'`"
    validations:
      required: true

  - type: input
    id: k8s-version
    attributes:
      label: Kubernetes version
      description: "`kubectl version --short`"
    validations:
      required: true

  - type: input
    id: install-method
    attributes:
      label: Installation method
      placeholder: "Helm / kubectl apply / make local-up"
    validations:
      required: true

  - type: checkboxes
    id: coc
    attributes:
      label: Code of Conduct
      options:
        - label: I have read and agree to the [Code of Conduct](https://github.com/kubeswarm/kubeswarm/blob/main/CODE_OF_CONDUCT.md)
          required: true

name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: operator
            image: ghcr.io/${{ github.repository_owner }}/kubeswarm-operator
            dockerfile: Dockerfile
            build-args: VERSION=${{ github.ref_name }}
          - name: runtime
            image: ghcr.io/${{ github.repository_owner }}/kubeswarm-runtime
            dockerfile: Dockerfile.agent
            build-args: ""
    steps:
      - uses: actions/checkout@v6

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          build-args: ${{ matrix.build-args }}
          tags: ${{ matrix.image }}:${{ steps.version.outputs.version }}
          load: true
          push: false

      - name: Save image tarball
        run: docker save ${{ matrix.image }}:${{ steps.version.outputs.version }} -o /tmp/${{ matrix.name }}.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-${{ matrix.name }}
          path: /tmp/${{ matrix.name }}.tar
          retention-days: 1

  scan:
    name: Scan (${{ matrix.name }})
    runs-on: ubuntu-latest
    needs: [build]
    strategy:
      matrix:
        include:
          - name: operator
            image: ghcr.io/${{ github.repository_owner }}/kubeswarm-operator
          - name: runtime
            image: ghcr.io/${{ github.repository_owner }}/kubeswarm-runtime
    steps:
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: image-${{ matrix.name }}
          path: /tmp

      - name: Load image
        run: docker load -i /tmp/${{ matrix.name }}.tar

      - name: Install Grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh \
            | sh -s -- -b /usr/local/bin v0.110.0

      - name: Scan for CVEs
        run: grype ${{ matrix.image }}:${{ steps.version.outputs.version }} --fail-on high

  push:
    name: Push (${{ matrix.name }})
    runs-on: ubuntu-latest
    needs: [scan]
    strategy:
      matrix:
        include:
          - name: operator
            image: ghcr.io/${{ github.repository_owner }}/kubeswarm-operator
            dockerfile: Dockerfile
            build-args: VERSION=${{ github.ref_name }}
          - name: runtime
            image: ghcr.io/${{ github.repository_owner }}/kubeswarm-runtime
            dockerfile: Dockerfile.agent
            build-args: ""
    steps:
      - uses: actions/checkout@v6

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push multi-arch
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          build-args: ${{ matrix.build-args }}
          push: true
          tags: |
            ${{ matrix.image }}:${{ steps.version.outputs.version }}
            ${{ matrix.image }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [push]
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build install.yaml
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          make build-installer IMG="ghcr.io/${{ github.repository_owner }}/kubeswarm-operator:${VERSION}"

      - name: Generate changelog
        id: notes
        run: |
          PREV=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV" ]; then
            BODY=$(git log --pretty=format:"- %s (%h)" "${PREV}..HEAD")
          else
            BODY=$(git log --pretty=format:"- %s (%h)")
          fi
          {
            echo "body<<EOF"
            echo "$BODY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NOTES: ${{ steps.notes.outputs.body }}
        run: |
          echo "$NOTES" > /tmp/release-notes.md
          PRERELEASE_FLAG=""
          if [[ "${{ github.ref_name }}" =~ -(dev|alpha|beta|rc)(\.[0-9]+)?$ ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "${{ github.ref_name }}" \
            --title "Release ${{ github.ref_name }}" \
            --notes-file /tmp/release-notes.md \
            $PRERELEASE_FLAG \
            dist/install.yaml

      - name: Dispatch helm-charts sync
        if: ${{ !contains(github.ref_name, '-') }}
        env:
          GH_TOKEN: ${{ secrets.HELM_SYNC_TOKEN }}
        run: |
          gh api repos/kubeswarm/helm-charts/dispatches \
            --method POST \
            --field event_type=operator-released \
            --field "client_payload[version]=${GITHUB_REF_NAME#v}"

      - name: Dispatch docs sync
        if: ${{ !contains(github.ref_name, '-') }}
        env:
          GH_TOKEN: ${{ secrets.HELM_SYNC_TOKEN }}
        run: |
          gh api repos/kubeswarm/kubeswarm-docs/dispatches \
            --method POST \
            --field event_type=operator-released \
            --field "client_payload[version]=${GITHUB_REF_NAME#v}"

      - name: Dispatch dashboard types sync
        if: ${{ !contains(github.ref_name, '-') }}
        env:
          GH_TOKEN: ${{ secrets.HELM_SYNC_TOKEN }}
        run: |
          gh api repos/kubeswarm/kubeswarm-dashboard/dispatches \
            --method POST \
            --field event_type=operator-released \
            --field "client_payload[version]=${GITHUB_REF_NAME#v}"

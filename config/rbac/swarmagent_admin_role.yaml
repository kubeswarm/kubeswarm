---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: kubeswarm
    app.kubernetes.io/managed-by: kustomize
  name: swarmagent-admin-role
rules:
  - apiGroups:
      - kubeswarm
    resources:
      - swarmagents
    verbs:
      - "*"
  - apiGroups:
      - kubeswarm
    resources:
      - swarmagents/status
    verbs:
      - get

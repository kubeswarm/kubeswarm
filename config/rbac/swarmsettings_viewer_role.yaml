---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: kubeswarm
    app.kubernetes.io/managed-by: kustomize
  name: swarmsettings-viewer-role
rules:
  - apiGroups:
      - kubeswarm
    resources:
      - swarmsettings
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - kubeswarm
    resources:
      - swarmsettings/status
    verbs:
      - get

---
apiVersion: v1
kind: Namespace
metadata:
  name: swarm-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubeswarm
  namespace: swarm-system
---
# manager-role (config/rbac/role.yaml) is auto-generated from +kubebuilder:rbac markers
# and kept up to date by `make manifests`. Apply it before this file:
#   kubectl apply -f config/rbac/role.yaml
#   kubectl apply -f config/local/operator.yaml
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubeswarm
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: manager-role
subjects:
  - kind: ServiceAccount
    name: kubeswarm
    namespace: swarm-system
---
apiVersion: v1
kind: Service
metadata:
  name: kubeswarm
  namespace: swarm-system
spec:
  selector:
    app: kubeswarm
  ports:
    - name: webhook
      port: 8092
      targetPort: 8092
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubeswarm
  namespace: swarm-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kubeswarm
  template:
    metadata:
      labels:
        app: kubeswarm
    spec:
      serviceAccountName: kubeswarm
      containers:
        - name: kubeswarm-operator
          image: kubeswarm:latest
          imagePullPolicy: Always
          args:
            - --agent-image=runtime:latest
            - --health-probe-bind-address=:8081
            - --metrics-bind-address=0
            - --metrics-secure=false
            - --trigger-webhook-url=http://controller.swarm-system.svc.cluster.local:8092
            - --disable-admission-webhooks=true
          ports:
            - containerPort: 8081
              name: health
            - containerPort: 8092
              name: webhook
          env:
            - name: TASK_QUEUE_URL
              value: redis://kubeswarm-redis.swarm-system.svc.cluster.local:6379
            - name: AGENT_TASK_QUEUE_URL
              value: redis://kubeswarm-redis.swarm-system.svc.cluster.local:6379
            - name: SWARM_AGENT_INJECT_AGENT_PROVIDER
              value: openai
            - name: SWARM_AGENT_INJECT_OPENAI_BASE_URL
              value: http://host.docker.internal:11434/v1
            - name: SWARM_AGENT_INJECT_OPENAI_API_KEY
              value: ollama
            # Meta-agent (optimizer) also needs direct LLM access
            - name: OPENAI_BASE_URL
              value: http://host.docker.internal:11434/v1
            - name: OPENAI_API_KEY
              value: ollama
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10

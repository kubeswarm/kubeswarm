                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              entryRole:
                description: EntryRole is the role name that is the external submission
                  point.
                type: string
              lastActiveTime:
                description: |-
                  LastActiveTime is when the team last had an active (running) pipeline step.
                  Used by the autoscaler to decide when to scale idle roles to zero.
                format: date-time
                type: string
              lastRunName:
                description: |-
                  LastRunName is the name of the most recently created SwarmRun for this team.
                  Empty when no run has been triggered yet.
                type: string
              lastRunPhase:
                description: |-
                  LastRunPhase is the phase of the most recently created SwarmRun.
                  Mirrors SwarmRun.Status.Phase for quick visibility in kubectl get swarmteam.
                enum:
                - Pending
                - Running
                - Succeeded
                - Failed
                type: string
              observedGeneration:
                description: ObservedGeneration is the .metadata.generation this status
                  reflects.
                format: int64
                type: integer
              phase:
                description: |-
                  Phase is the overall team state.
                  For pipeline teams this mirrors the most recent SwarmRun phase.
                  For dynamic teams this reflects infrastructure readiness.
                enum:
                - Pending
                - Ready
                - Running
                - Succeeded
                - Failed
                type: string
              roles:
                description: Roles lists the observed state of each role.
                items:
                  description: SwarmTeamRoleStatus captures the observed state of
                    one team role.
                  properties:
                    desiredReplicas:
                      description: DesiredReplicas is the configured replica count
                        for this role.
                      format: int32
                      type: integer
                    managedSwarmAgent:
                      description: ManagedSwarmAgent is the name of the auto-created
                        SwarmAgent for inline roles.
                      type: string
                    name:
                      description: Name matches SwarmTeamRole.Name.
                      type: string
                    readyReplicas:
                      description: ReadyReplicas is the number of agent pods ready
                        to accept tasks.
                      format: int32
                      type: integer
                  required:
                  - name
                  type: object
                type: array
              scaledToZero:
                description: |-
                  ScaledToZero is true when all inline-role agents have been scaled to 0 replicas
                  due to team autoscaling idle timeout. The team warms up automatically when triggered.
                type: boolean
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}

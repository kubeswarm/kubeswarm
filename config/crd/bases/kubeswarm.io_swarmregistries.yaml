---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: swarmregistries.kubeswarm.io
spec:
  group: kubeswarm.io
  names:
    categories:
    - kubeswarm
    kind: SwarmRegistry
    listKind: SwarmRegistryList
    plural: swarmregistries
    shortNames:
    - swreg
    - swregs
    singular: swarmregistry
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.scope
      name: Scope
      type: string
    - jsonPath: .status.indexedAgents
      name: Agents
      type: integer
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          SwarmRegistry is a Kubernetes-native capability index that lets pipeline steps
          resolve an agent at runtime by what it can do rather than by a hardcoded name.
          Agents advertise capabilities via spec.capabilities on SwarmAgentSpec.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: SwarmRegistrySpec defines the desired state of SwarmRegistry.
            properties:
              mcpBindings:
                description: |-
                  MCPBindings maps capability IDs to MCP server URLs for this deployment.
                  Agents that declare mcpServers with capabilityRef have their URLs resolved
                  from this list at reconcile time. This allows cookbook-style agent definitions
                  to remain URL-free; operators supply the bindings per namespace.
                items:
                  description: |-
                    MCPBinding maps a capability ID to the MCP server URL that provides it in this deployment.
                    Used to resolve MCPServerSpec.capabilityRef at reconcile time so that shared agent
                    definitions (e.g. from cookbook) remain URL-free.
                  properties:
                    capabilityId:
                      description: |-
                        CapabilityID is the capability identifier to resolve.
                        Must match MCPServerSpec.capabilityRef on the referencing agent.
                      minLength: 1
                      type: string
                    url:
                      description: URL is the SSE endpoint of the MCP server that
                        provides this capability.
                      minLength: 1
                      type: string
                  required:
                  - capabilityId
                  - url
                  type: object
                type: array
              policy:
                description: Policy controls delegation safety.
                properties:
                  allowCrossTeam:
                    default: false
                    description: |-
                      AllowCrossTeam permits resolution of agents managed by other SwarmTeams.
                      Default false — only agents not owned by another team's inline roles.
                    type: boolean
                  maxDepth:
                    default: 3
                    description: |-
                      MaxDepth is the maximum agent-to-agent delegation depth.
                      Prevents runaway recursion.
                    maximum: 20
                    minimum: 1
                    type: integer
                type: object
              scope:
                allOf:
                - enum:
                  - namespace-scoped
                  - cluster-wide
                - enum:
                  - namespace-scoped
                  - cluster-wide
                default: namespace-scoped
                description: |-
                  Scope controls which SwarmAgents are indexed.
                  namespace-scoped: only SwarmAgents in the same namespace (default).
                  cluster-wide: all SwarmAgents cluster-wide (requires ClusterRole).
                type: string
            type: object
          status:
            description: SwarmRegistryStatus defines the observed state of SwarmRegistry.
            properties:
              capabilities:
                description: Capabilities lists all capabilities indexed, with their
                  associated agents and tags.
                items:
                  description: IndexedCapability is one capability entry in the SwarmRegistry
                    status index.
                  properties:
                    agents:
                      description: Agents is the list of SwarmAgent names that advertise
                        this capability.
                      items:
                        type: string
                      type: array
                    description:
                      description: |-
                        Description is the human-readable description of the capability, taken from the
                        first agent that declares it. Used by the router LLM to select the right agent.
                      type: string
                    id:
                      description: ID is the capability identifier.
                      type: string
                    tags:
                      description: Tags is the union of all tags declared for this
                        capability across all agents.
                      items:
                        type: string
                      type: array
                  required:
                  - id
                  type: object
                type: array
              conditions:
                description: Conditions reflect the current state of the SwarmRegistry.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              fleet:
                description: |-
                  Fleet is the list of SwarmAgents currently registered with this registry,
                  with per-agent readiness and token usage. Replaces the implicit
                  "all agents in namespace" model with an explicit opt-in list.
                items:
                  description: AgentFleetEntry is one agent's summary in the registry
                    fleet view.
                  properties:
                    capabilities:
                      description: Capabilities lists the capability IDs this agent
                        contributes to the index.
                      items:
                        type: string
                      type: array
                    dailyTokens:
                      description: DailyTokens is the rolling 24h token usage copied
                        from SwarmAgent.status.
                      format: int64
                      type: integer
                    model:
                      description: Model is the LLM model this agent is configured
                        to use.
                      type: string
                    name:
                      description: Name is the SwarmAgent name.
                      type: string
                    readyReplicas:
                      description: ReadyReplicas is the number of agent pods currently
                        ready.
                      format: int32
                      type: integer
                  required:
                  - model
                  - name
                  - readyReplicas
                  type: object
                type: array
              indexedAgents:
                description: IndexedAgents is the total number of SwarmAgents indexed
                  by this registry.
                type: integer
              lastRebuild:
                description: LastRebuild is the time the index was last rebuilt.
                format: date-time
                type: string
              observedGeneration:
                description: ObservedGeneration is the .metadata.generation this status
                  reflects.
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}

apiVersion: kubeswarm/v1alpha1
kind: SwarmMemory
metadata:
  name: research-memory
  namespace: default
spec:
  backend: redis
  redis:
    secretRef:
      name: redis-memory-credentials # must contain REDIS_URL
    ttlSeconds: 3600
    maxEntries: 1000
---
apiVersion: kubeswarm/v1alpha1
kind: SwarmMemory
metadata:
  name: research-memory-vector
  namespace: default
spec:
  backend: vector-store
  vectorStore:
    provider: qdrant
    endpoint: http://qdrant.qdrant.svc.cluster.local:6333
    collection: research-agent-memories
    secretRef:
      name: qdrant-credentials # must contain VECTOR_STORE_API_KEY
    ttlSeconds: 86400

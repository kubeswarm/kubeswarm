apiVersion: kubeswarm/v1alpha1
kind: SwarmSettings
metadata:
  name: base-research-config
  namespace: default
spec:
  temperature: "0.7"
  outputFormat: structured-json
  memoryBackend: in-context
  promptFragments:
    persona: "You are an expert analyst with deep knowledge across many domains."
    outputRules: "Always cite sources. Structure output as JSON with 'summary' and 'sources' keys."

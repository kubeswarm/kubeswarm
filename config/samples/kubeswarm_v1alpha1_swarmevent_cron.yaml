apiVersion: kubeswarm/v1alpha1
kind: SwarmEvent
metadata:
  name: daily-report-trigger
  namespace: default
spec:
  source:
    type: cron
    cron: "0 9 * * 1-5" # 09:00 UTC on weekdays
  targets:
    - team: report-pipeline
      input:
        reportDate: "{{ .trigger.firedAt }}"
  concurrencyPolicy: Forbid
  suspended: false
